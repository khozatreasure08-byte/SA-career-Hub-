<header>
    <img src="b146e53d-516e-44bf-bb7c-bf73e4a77586.png" class="logo">
    <h1>Free CV Builder</h1>
    <p>Create your professional CV for free.</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="jobs.html">Jobs</a>

<section class="card">
    <h2>Create Your CV</h2>

    <input type="text" id="name" placeholder="Full Name">

    <input type="email" id="email" placeholder="Email Address">

    <input type="text" id="phone" placeholder="Phone Number">

    <textarea id="education" placeholder="Education" rows="4"></textarea>

    <textarea id="experience" placeholder="Work Experience" rows="4"></textarea>

    <textarea id="skills" placeholder="Skills" rows="4"></textarea>

    <button onclick="downloadCV()">Download CV</button>
</section>
