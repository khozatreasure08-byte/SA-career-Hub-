<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internships - SA Career Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="b146e53d-516e-44bf-bb7c-bf73e4a77586.png" class="logo" alt="SA Career Hub Logo">
    <h1>Internships</h1>
    <p>Start your career with internship opportunities.</p>
</header>

<section class="card">

<h2>Latest Internships</h2>
    <div class="internship-search">

    <input
        type="text"
        id="internshipSearch"
        placeholder="🔍 Search Internships...">

    <div class="internship-filters">

        <select id="internshipProvince">
            <option value="">All Provinces</option>
            <option>Nationwide</option>
            <option>Gauteng</option>
            <option>KwaZulu-Natal</option>
            <option>Western Cape</option>
            <option>Eastern Cape</option>
            <option>Limpopo</option>
            <option>Mpumalanga</option>
            <option>North West</option>
            <option>Free State</option>
            <option>Northern Cape</option>
        </select>

        <select id="internshipCategory">
            <option value="">All Categories</option>
            <option>IT</option>
            <option>Finance</option>
            <option>Engineering</option>
            <option>Government</option>
            <option>Retail</option>
        </select>

    </div>

    </div>

<div class="job" data-province="Gauteng" data-category="IT">
<h3>IT Internship</h3>
<p><strong>Company:</strong> MTN</p>
<p><strong>Location:</strong> Johannesburg</p>
    <button onclick="saveInternship('IT Internship')">
❤️ Save Internship
    </button>
</div>

<div class="job" data-province="Western Cape" data-category="Finance">
<h3>Engineering Internship</h3>
<p><strong>Company:</strong> Transnet</p>
<p><strong>Location:</strong> Durban</p>
    <button onclick="saveInternship('Finance Internship')">
❤️ Save Internship
    </button>
</div>

</section>

<footer>
<p>© 2026 SA Career Hub. All Rights Reserved.</p>
</footer>

</body>
</html>
