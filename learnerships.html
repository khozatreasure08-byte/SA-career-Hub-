<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnerships - SA Career Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <img src="b146e53d-516e-44bf-bb7c-bf73e4a77586.png" class="logo" alt="SA Career Hub Logo">
    <h1>Learnerships</h1>
    <p>Find the latest learnership opportunities.</p>
</header>

<section class="card">

<h2>Latest Learnerships</h2>
    <div class="learnership-search">

<input
type="text"
id="learnershipSearch"
placeholder="🔍 Search Learnerships...">

<div class="learnership-filters">

<select id="learnershipProvince">

<option value="">All Provinces</option>
    <option>Nationwide</option>

<option>Gauteng</option>

<option>KwaZulu-Natal</option>

<option>Western Cape</option>

<option>Eastern Cape</option>

<option>Limpopo</option>

<option>Mpumalanga</option>

<option>North West</option>

<option>Free State</option>

<option>Northern Cape</option>

</select>

<select id="learnershipCategory">

<option value="">All Categories</option>

<option>Retail</option>

<option>Banking</option>

<option>Government</option>

<option>Engineering</option>

<option>IT</option>

</select>

</div>

    </div>

<div class="job" data-province="Gauteng" data-category="Banking">
<h3>Banking Learnership</h3>
<p><strong>Company:</strong> Capitec Bank</p>
<p><strong>Location:</strong> South Africa</p>
    <button onclick="saveLearnership('Banking Learnership - Capitec Bank')">
❤️ Save Learnership
    </button>
</div>

<div class="job" data-province="Nationwide" data-category="Retail">
<h3>Retail Learnership</h3>
<p><strong>Company:</strong> Pick n Pay</p>
<p><strong>Location:</strong> Nationwide</p>
    <button onclick="saveLearnership('Retail Learnership - Pick n Pay')">
❤️ Save Learnership
    </button>
</div>

</section>

<footer>
<p>© 2026 SA Career Hub. All Rights Reserved.</p>
</footer>
<script src="script.js"></script>
</body>
</html>
